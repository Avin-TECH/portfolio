<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Avin Joju — AI & Data Science{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #FF6B00;
            --orange-light: #FF8C00;
            --black: #0f0c07;
            --dark: #1a1208;
            --white: #fff8f0;
            --grey: #a09080;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        .ai-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.07;
            background-image: url('https://images.unsplash.com/photo-1676299081847-c3c9b8e3e094?w=1920&q=80');
            background-size: cover;
            background-position: center;
            filter: grayscale(100%);
        }

        .neural-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(255,107,0,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255,200,150,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255,140,0,0.08) 0%, transparent 50%),
                linear-gradient(135deg, #1a1208 0%, #120d05 40%, #0a0a0a 100%);
        }

        .navbar {
            background: rgba(15,12,7,0.97);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,107,0,0.3);
            padding: 20px 0;
        }

        .navbar-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: var(--white) !important;
            letter-spacing: 3px;
        }

        .navbar-brand span { color: var(--orange); }

        .nav-link {
            color: var(--grey) !important;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 15px;
            transition: color 0.3s;
        }

        .nav-link:hover { color: var(--orange) !important; }

        .btn-orange {
            background: var(--orange);
            color: var(--white);
            border: none;
            padding: 12px 35px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-orange:hover {
            background: var(--orange-light);
            color: var(--white);
            transform: translateY(-2px);
        }

        .btn-outline-orange {
            background: transparent;
            color: var(--orange);
            border: 1px solid var(--orange);
            padding: 12px 35px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-outline-orange:hover {
            background: var(--orange);
            color: var(--white);
        }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--white);
            border-radius: 0;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--orange);
            background: rgba(255,107,0,0.05);
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(255,107,0,0.1);
        }

        .section { padding: 100px 0; }

        .section-label {
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--orange);
            margin-bottom: 15px;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            color: var(--white);
            letter-spacing: 3px;
            line-height: 1;
            margin-bottom: 50px;
        }

        .accent { color: var(--orange); }

        .bracket-label {
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--orange);
            text-transform: uppercase;
        }

        .progress {
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 0;
        }

        .progress-bar { background: var(--orange); }

        footer {
            background: var(--dark);
            border-top: 1px solid rgba(255,107,0,0.3);
            padding: 50px 0;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .orange-divider {
            width: 60px;
            height: 3px;
            background: var(--orange);
            margin: 20px 0;
        }

        html { scroll-behavior: smooth; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <div class="neural-bg"></div>
    <div class="ai-bg"></div>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/">AVIN <span>JOJU</span></a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fas fa-bars" style="color: var(--orange);"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/projects">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="/resume">Resume</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>{% block content %}{% endblock %}</main>

    <footer>
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-4">
                    <div style="font-family: 'Bebas Neue'; font-size: 2rem; letter-spacing: 3px;">
                        AVIN <span class="accent">JOJU</span>
                    </div>
                    <p style="color: var(--grey); font-size: 0.85rem; margin-top: 10px;">
                        AI & Data Science Engineer
                    </p>
                </div>
                <div class="col-md-4 text-center">
                    <p style="color: var(--grey); font-size: 0.8rem; letter-spacing: 2px;">
                        [ BUILT WITH DJANGO ]
                    </p>
                </div>
                <div class="col-md-4 text-end">
                    <a href="https://github.com/Avin-TECH" target="_blank" class="me-3" style="color: var(--white);">
                        <i class="fab fa-github fa-lg"></i>
                    </a>
                    <a href="https://www.linkedin.com/in/avin-joju" target="_blank" class="me-3" style="color: var(--white);">
                        <i class="fab fa-linkedin fa-lg"></i>
                    </a>
                    <a href="mailto:avin.joju@outlook.com" style="color: var(--white);">
                        <i class="fas fa-envelope fa-lg"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.addEventListener('load', () => {
            document.querySelectorAll('.fade-in').forEach((el, index) => {
                setTimeout(() => {
                    el.classList.add('visible');
                }, index * 150);
            });

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.05 });

            document.querySelectorAll('.fade-in').forEach(el => {
                observer.observe(el);
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
